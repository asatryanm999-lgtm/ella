<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ella's Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Great+Vibes&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ffb6c1; --d: #ff69b4; }
        body { margin: 0; background: #fffaf0; font-family: 'Montserrat', sans-serif; text-align: center; touch-action: none; overflow: hidden; }
        #scr { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; background: white; }
        .dr { position: absolute; top: 0; width: 50%; height: 100%; background: white; border: 1px solid var(--p); transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1); z-index: 1; }
        #cont { position: relative; z-index: 10; touch-action: none; text-align: center; }
        #bow { width: 180px; transition: transform 0.1s linear; }
        .open .dr-l { transform: translateX(-100%); opacity: 0; }
        .open .dr-r { transform: translateX(100%); opacity: 0; }
        .main { display: none; opacity: 0; padding: 20px; transition: 1.5s; overflow-y: auto; height: 100vh; }
        .hero { width: 280px; height: 280px; border-radius: 20px; border: 8px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; object-fit: cover; }
        .rsvp { background: white; padding: 20px; border-radius: 30px; border: 2px solid var(--d); margin: 20px auto; max-width: 320px; }
        input { width: 85%; padding: 12px; margin: 8px auto; border: 1px solid #eee; border-radius: 10px; display: block; font-size: 16px; }
        .btn { background: var(--d); color: white; border: none; padding: 15px; width: 90%; border-radius: 40px; font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <audio id="mus" src="music.mp3" loop></audio>
    <div id="scr">
        <div id="cont">
            <img src="bow.png" id="bow">
            <p style="color:var(--d); font-family:'Dancing Script'; font-size: 1.4rem; margin-top: 10px;">Քաշիր ներքև</p>
        </div>
        <div class="dr dr-l" style="left:0"></div>
        <div class="dr dr-r" style="right:0"></div>
    </div>

    <div class="main" id="main">
        <h1 style="font-family:'Great Vibes'; color:var(--d); font-size: 3rem; margin-bottom: 10px;">Ella's 10th Birthday</h1>
        <img src="ella_photo.jpg" class="hero">

        <div style="display:flex; justify-content:center; gap:10px; margin:20px 0; font-weight:bold; color:var(--d);">
            <div style="background:white; padding:8px; border-radius:8px; border:1px solid var(--p); min-width:45px;"><span id="days">00</span>օր</div>
            <div style="background:white; padding:8px; border-radius:8px; border:1px solid var(--p); min-width:45px;"><span id="hours">00</span>ժ</div>
            <div style="background:white; padding:8px; border-radius:8px; border:1px solid var(--p); min-width:45px;"><span id="mins">00</span>ր</div>
        </div>

        <div class="rsvp">
            <h3 style="font-family:'Dancing Script'; color:var(--d); font-size: 1.8rem; margin: 0 0 15px;">RSVP</h3>
            <input type="text" id="n" placeholder="Անուն Ազգանուն">
            <input type="tel" id="ph" placeholder="Հեռախոսահամար">
            <input type="number" id="c" placeholder="Հյուրերի քանակ">
            <button class="btn" onclick="send()">Ուղարկել WhatsApp</button>
        </div>
        <p style="font-family:'Great Vibes'; font-size: 2.5rem; color: var(--d); margin-top: 30px;">Սիրով` Էլլա ♡</p>
    </div>
    <script>
        let sY = 0, drag = false;
        const b = document.getElementById('bow'), s = document.getElementById('scr'), m = document.getElementById('main'), c = document.getElementById('cont');

        c.ontouchstart = (e) => { drag = true; sY = e.touches[0].pageY; b.style.transition = 'none'; };
        
        window.ontouchmove = (e) => {
            if (!drag) return;
            if (e.cancelable) e.preventDefault(); // Կարևոր է հեռախոսի համար
            let df = e.touches[0].pageY - sY;
            if (df > 0 && df < 180) {
                b.style.transform = `translateY(${df}px)`;
                if (df >= 80) finish();
            }
        };

        function finish() {
            if (!drag) return; drag = false;
            document.getElementById('mus').play().catch(()=>{});
            s.classList.add('open');
            setTimeout(() => {
                m.style.display = 'block';
                setTimeout(() => {
                    m.style.opacity = 1;
                    s.style.display = 'none';
                    document.body.style.overflowY = 'auto';
                }, 50);
            }, 800);
        }

        window.ontouchend = () => { if(drag){ drag = false; b.style.transition = '0.5s'; b.style.transform = 'translateY(0)'; } };

        setInterval(() => {
            const diff = new Date("April 8, 2026 17:00:00") - new Date();
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
            }
        }, 1000);

        function send() {
            const name = document.getElementById('n').value, phone = document.getElementById('ph').value, count = document.getElementById('c').value;
            if(!name || !phone) return alert("Խնդրում ենք լրացնել տվյալները");
            window.open(`https://wa.me/37496872922?text=Ողջույն, ես ${name}-ն եմ (${phone}): Կգանք ${count} հոգով:`, '_blank');
        }
    </script>
</body>
</html>
