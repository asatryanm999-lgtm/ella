<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella's Royal Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fffaf0; font-family: 'Montserrat', sans-serif; text-align: center; color: #333; }
        #scr { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; background: white; cursor: pointer; }
        .dr { position: absolute; top: 0; width: 50%; height: 100%; background: white; border: 1px solid #ffb6c1; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1); }
        .open .dr-l { transform: translateX(-100%); } .open .dr-r { transform: translateX(100%); }
        .main-container { display: none; padding: 20px; opacity: 0; transition: 1.5s; overflow-x: hidden; }
        .hero { width: 95%; max-width: 320px; border-radius: 20px; border: 6px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin: 20px auto; }
        .timer { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        .t-box { background: white; padding: 10px; border-radius: 12px; border: 1.5px solid #ff69b4; min-width: 55px; }
        .t-box span { display: block; font-size: 1.4rem; font-weight: bold; color: #ff69b4; }
        .princess-card { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 30px 0; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .p-img { width: 90px; height: 90px; object-fit: contain; }
        .rsvp { background: white; padding: 25px; border-radius: 30px; border: 2.5px solid #ff69b4; margin: 40px auto; max-width: 330px; }
        input { width: 85%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; }
        .btn { background: #ff69b4; color: white; border: none; padding: 16px; width: 90%; border-radius: 40px; font-weight: bold; font-size: 1.1rem; }
        .map-frame { width: 100%; height: 250px; border-radius: 20px; border: 2px solid #ffb6c1; margin-top: 15px; }
    </style>
</head>
<body>
    <audio id="mus" src="music.mp3" loop></audio>
    <div id="scr" onclick="openParty()">
        <div style="z-index:100;"><img src="bow.png" style="width:160px;"><p style="color:#ff69b4; font-family:'Dancing Script'; font-size: 1.5rem;">Սեղմիր բացելու համար</p></div>
        <div class="dr dr-l" style="left:0"></div><div class="dr dr-r" style="right:0"></div>
    </div>

    <div class="main-container" id="main">
        <h1 style="color:#ff69b4; font-family:'Dancing Script'; font-size: 3.2rem; margin: 10px 0;">Ella's 10th Birthday</h1>
        <img src="ella_photo.jpg" class="hero">

        <div class="timer">
            <div class="t-box"><span id="d">00</span>օր</div>
            <div class="t-box"><span id="h">00</span>ժ</div>
            <div class="t-box"><span id="m">00</span>ր</div>
            <div class="t-box" style="border-color:#d4af37;"><span id="s" style="color:#d4af37;">00</span>վ</div>
        </div>

        <div class="princess-card"><img src="belle.png" class="p-img"><div><b>17:00</b><p>Դիմավորում Բելլի հետ</p></div></div>
        <div class="princess-card" style="flex-direction:row-reverse;"><img src="snowwhite.png" class="p-img"><div><b>19:00</b><p>Խաղավար Սպիտակաձյունիկ</p></div></div>
        <div class="princess-card"><img src="aurora.png" class="p-img"><div><b>21:00</b><p>Տորթի արարողություն</p></div></div>

        <div class="rsvp">
            <h3 style="color:#ff69b4; font-family:'Dancing Script'; font-size: 2rem;">RSVP</h3>
            <p>Խնդրում ենք հաստատել մինչև մարտի 25-ը</p>
            <input type="text" id="n" placeholder="Անուն Ազգանուն">
            <input type="tel" id="ph" placeholder="Հեռախոսահամար">
            <input type="number" id="c" placeholder="Հյուրերի քանակ">
            <button class="btn" onclick="send()">Ուղարկել WhatsApp</button>
            <h4 style="margin-top:30px; color:#ff69b4;">Գտնվելու վայրը</h4>
            <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3047.8833!2d44.5126!3d40.1776!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDEwJzM5LjQiTiA0NMKwMzAnNDUuNCJF!5e0!3m2!1shy!2s!4v123456789" allowfullscreen="" loading="lazy"></iframe>
        </div>
        <p style="font-family:'Dancing Script'; font-size: 2.5rem; color:#ff69b4; margin: 40px 0;">Սիրով` Էլլա ♡</p>
    </div>
    <script>
        function openParty() {
            document.getElementById('mus').play().catch(()=>{});
            document.getElementById('scr').classList.add('open');
            setTimeout(() => {
                document.getElementById('main').style.display = 'block';
                document.getElementById('scr').style.display = 'none';
                setTimeout(() => { document.getElementById('main').style.opacity = '1'; }, 50);
            }, 1000);
        }

        setInterval(() => {
            const diff = new Date("April 8, 2026 17:00:00") - new Date();
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }
        }, 1000);

        function send() {
            const name = document.getElementById('n').value, phone = document.getElementById('ph').value, count = document.getElementById('c').value;
            if(!name || !phone) return alert("Խնդրում ենք լրացնել դաշտերը");
            window.open(`https://wa.me/37496872922?text=Ողջույն, ես ${name}-ն եմ (${phone}): Կգանք ${count} հոգով:`, '_blank');
        }
    </script>
</body>
</html>
