<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ella's Royal Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Great+Vibes&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ffb6c1; --dark: #ff69b4; --gold: #d4af37; }
        body { margin: 0; background: #fffaf0; font-family: 'Montserrat', sans-serif; text-align: center; overflow-x: hidden; touch-action: none; }
        
        /* ԷԿՐԱՆԸ ԾԱԾԿՈՂ ԴՌՆԵՐ */
        #entrance-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 10000; display: flex; align-items: center; justify-content: center; background: #000; }
        .door { position: absolute; top: 0; width: 50%; height: 100%; background: white; border: 1px solid var(--pink); transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1); z-index: 1; }
        .door-left { left: 0; }
        .door-right { right: 0; }
        
        /* ԲԱՆՏԻԿԻ ՇԱՐԺԸ */
        #magic-pull-container { position: relative; z-index: 10; cursor: pointer; user-select: none; }
        #bow-trigger { width: 200px; transition: transform 0.1s linear; pointer-events: none; }
        .pull-text { font-family: 'Dancing Script'; color: var(--dark); font-size: 1.5rem; margin-top: 15px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ԲԱՑՎԱԾ ՎԻՃԱԿ */
        .doors-open .door-left { transform: translateX(-100%); }
        .doors-open .door-right { transform: translateX(100%); }
        .doors-open #magic-pull-container { opacity: 0; pointer-events: none; transition: 0.8s; }

        /* ՀԻՄՆԱԿԱՆ ԲՈՎԱՆԴԱԿՈՒԹՅՈՒՆ */
        .main-content { opacity: 0; padding: 20px; transition: 2s; display: none; }
        .show-content { opacity: 1; display: block; }
        .hero-img { width: 320px; height: 320px; border-radius: 30px; border: 10px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin: 20px auto; object-fit: cover; }
        
        .countdown { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .time-box { background: white; padding: 12px; border-radius: 12px; border: 2px solid var(--pink); min-width: 60px; }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--dark); }

        .rsvp-section { background: white; padding: 30px 20px; border-radius: 35px; border: 3px solid var(--dark); margin: 40px auto; max-width: 350px; }
        .rsvp-section input { width: 90%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; display: block; margin: 0 auto 15px; }
        .rsvp-btn { background: var(--dark); color: white; border: none; padding: 18px; width: 95%; border-radius: 40px; font-weight: bold; font-size: 1.2rem; }
        
        .princess-card { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 30px 0; opacity: 0; transform: translateY(30px); transition: 1s; }
        .princess-card.visible { opacity: 1; transform: translateY(0); }
        .princess-img { width: 120px; mix-blend-mode: multiply; }
    </style>
</head>
<body>
    <audio id="royal-music" src="music.mp3" loop></audio>
    
    <div id="entrance-screen">
        <div id="magic-pull-container">
            <img src="bow.png" id="bow-trigger">
            <p class="pull-text">Քաշիր բանտիկը ներքև</p>
        </div>
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <div class="main-content" id="main-content">
        <h1 style="font-family:'Great Vibes'; color:var(--dark); font-size: 3.5rem;">Ella's 10th Birthday</h1>
        <img src="ella_photo.jpg" class="hero-img">

        <div class="countdown">
            <div class="time-box"><span id="d">00</span>Օր</div>
            <div class="time-box"><span id="h">00</span>Ժամ</div>
            <div class="time-box"><span id="m">00</span>Րոպե</div>
            <div class="time-box" style="border-color:var(--gold)"><span id="s" style="color:var(--gold)">00</span>Վրկ</div>
        </div>

        <div class="princess-card js-scroll"><img src="belle.png" class="princess-img"><div><b>17:00</b><p>Դիմավորում</p></div></div>
        <div class="princess-card js-scroll" style="flex-direction:row-reverse"><img src="snowwhite.png" class="princess-img"><div><b>19:00</b><p>Խաղավար</p></div></div>
        <div class="princess-card js-scroll"><img src="aurora.png" class="princess-img"><div><b>21:00</b><p>Տորթ</p></div></div>

        <div class="rsvp-section">
            <h3 style="color:var(--dark); font-family:'Dancing Script';">RSVP</h3>
            <input type="text" id="gName" placeholder="Անուն Ազգանուն">
            <input type="tel" id="gPhone" placeholder="Հեռախոսահամար">
            <input type="number" id="gCount" placeholder="Հյուրերի քանակ">
            <button class="rsvp-btn" onclick="sendRSVP()">Ուղարկել WhatsApp-ին</button>
        </div>
        <p style="font-family:'Great Vibes'; font-size: 3rem; color: var(--dark);">Սիրով` Էլլա ♡</p>
    </div>
<script>
        const container = document.getElementById('magic-pull-container');
        const bow = document.getElementById('bow-trigger');
        const screen = document.getElementById('entrance-screen');
        let startY = 0;
        let isDragging = false;

        // Սկսել քաշելը
        const start = (e) => {
            isDragging = true;
            startY = e.pageY || e.touches[0].pageY;
        };

        // Քաշելու ընթացքը
        const move = (e) => {
            if (!isDragging) return;
            let currentY = e.pageY || e.touches[0].pageY;
            let diff = currentY - startY;
            if (diff > 0 && diff < 150) {
                bow.style.transform = `translateY(${diff}px)`;
            }
            if (diff >= 100) {
                openDoors();
            }
        };

        // Դռները բացել
        const openDoors = () => {
            if (!isDragging) return;
            isDragging = false;
            document.getElementById('royal-music').play().catch(()=>{});
            screen.classList.add('doors-open');
            setTimeout(() => {
                document.getElementById('main-content').classList.add('show-content');
                setTimeout(() => screen.style.display = 'none', 1200);
            }, 500);
        };

        container.addEventListener('mousedown', start);
        container.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', () => { isDragging = false; bow.style.transform = 'translateY(0)'; });

        // Թայմեր և RSVP
        setInterval(() => {
            const diff = new Date("April 8, 2026 17:00:00") - new Date();
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000);
                document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24);
                document.getElementById('m').innerText = Math.floor((diff / 60000) % 60);
                document.getElementById('s').innerText = Math.floor((diff / 1000) % 60);
            }
        }, 1000);

        function sendRSVP() {
            const name = document.getElementById('gName').value;
            const phone = document.getElementById('gPhone').value;
            const count = document.getElementById('gCount').value;
            const message = `Ողջույն, ես ${name}-ն եմ (Հեռ: ${phone}): Կգանք ${count} հոգով:`;
            window.open(`https://wa.me/37496872922?text=${encodeURIComponent(message)}`, '_blank');
        }

        // Սքրոլ անիմացիա
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.js-scroll').forEach(el => observer.observe(el));
    </script>
</body>
</html>
